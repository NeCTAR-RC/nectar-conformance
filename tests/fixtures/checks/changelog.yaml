---
# Frozen conformance changelog used ONLY by the test suite.
#
# This is deliberately independent of the shipped changelog
# (nectar_conformance/checks/changelog.yaml). Behavioural tests fold THIS file so that
# appending a real dated rollout to the shipped changelog never forces a test update.
# The values here are pinned to what the healthy `site_model` fixture (tests/conftest.py)
# and the static catalog fixtures (tests/fixtures/catalogs) provide, so a complete site
# is fully conformant and a drifted node fails.
#
# Keep this a pure baseline: every entry is effective from the spec's first day with no
# `due` date, so the fold is date-insensitive (everything enforced, nothing pending) at
# any evaluation instant. Staggered test/prod rollouts are exercised by the in-test
# changelogs built in test_changelog.py and test_engine.py, not from here.
#
# Check definitions are still loaded from the package (the value-free logic contract);
# only the bound values live in this fixture.

tags:
  # A pinned evaluation date, used by the tag-resolution and report tests.
  "2026.1": "2026-03-01"

entries:
