---
id: iscsid.image_tag
title: iscsid image tag is pinned to the approved release
description: >
  The iscsid container (used for cinder volume attachment) on the controllers must run
  the Core Services approved kolla image tag.
spec_section: "2.2.3"
kind: declarative
selector:
  type: has_resource
  resource_type: Docker::Run
  resource_title: iscsid
query:
  type: resource_param
  resource_type: Docker::Run
  resource_title: iscsid
  param: image
  extract: 'regex:.*:(?P<value>[^:]+)$'
assertion:
  op: equals
remediation:
  guidance: Pin the approved iscsid image tag in the controller nodegroup hiera.
  hiera_key: nectar::profile::iscsid::image_tag
  hint_file: data/nodegroups/<oc-nodegroup>.yaml
