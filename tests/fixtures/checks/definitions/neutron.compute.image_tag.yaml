---
id: neutron.compute.image_tag
title: Neutron compute agent image tag is pinned to the approved release
description: >
  The neutron OVN metadata agent container on the hypervisors must run the Core
  Services approved kolla image tag.
spec_section: "2.2.4"
severity: error
kind: declarative
selector:
  type: contains_class
  class: nectar::profile::neutron::neutron_ovn_metadata_container
query:
  type: resource_param
  resource_type: Docker::Run
  resource_title: neutron-ovn-metadata-agent
  param: image
  extract: 'regex:.*:(?P<value>[^:]+)$'
assertion:
  op: equals
remediation:
  guidance: Pin the approved neutron image tag in the compute nodegroup hiera.
  hiera_key: nectar::profile::neutron::common::image_tag
  hint_file: data/nodegroups/<cn-nodegroup>.yaml
