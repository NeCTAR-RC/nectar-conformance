---
id: os.mq.ubuntu
title: Message queue nodes run an approved Ubuntu release
description: >
  The RabbitMQ message queue cluster nodes must run one of the approved Ubuntu releases
  (the changelog binds the accepted set).
spec_section: "2.1"
severity: error
kind: declarative
selector:
  type: contains_class
  class: nectar::profile::rabbitmq::cluster
query:
  type: fact
  path: os.release.full
assertion:
  op: in_set
remediation:
  guidance: Reinstall or upgrade the message queue nodes onto an approved Ubuntu release.
