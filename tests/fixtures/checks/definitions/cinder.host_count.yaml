kind: declarative
selector:
  type: all
query:
  type: count
  class: nectar::profile::cinder::volume
assertion:
  op: count_gte
remediation:
  guidance: Apply the cinder volume profile to at least the required number of hosts.
  hiera_key: nectar::profile::cinder::volume
