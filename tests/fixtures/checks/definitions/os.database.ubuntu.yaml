---
id: os.database.ubuntu
title: Database nodes run an approved Ubuntu release
description: >
  The Galera database cluster nodes must run one of the approved Ubuntu releases
  (the changelog binds the accepted set).
spec_section: "2.1"
kind: declarative
selector:
  type: contains_class
  class: nectar::profile::mariadb::cluster
query:
  type: fact
  path: os.release.full
assertion:
  op: in_set
remediation:
  guidance: Reinstall or upgrade the database nodes onto an approved Ubuntu release.
