---
id: nova.novnc.image_tag
title: Nova novnc proxy image tag is pinned to the approved release
description: >
  The nova-novncproxy container on the controllers must run the Core Services approved
  kolla image tag.
spec_section: "2.2.1"
kind: declarative
selector:
  type: contains_class
  class: nectar::profile::nova::novnc
query:
  type: resource_param
  resource_type: Docker::Run
  resource_title: nova-novncproxy
  param: image
  extract: 'regex:.*:(?P<value>[^:]+)$'
assertion:
  op: equals
remediation:
  guidance: Pin the approved nova control-plane image tag in the controller nodegroup hiera.
  hiera_key: nectar::profile::nova::common::image_tag
  hint_file: data/nodegroups/<oc-nodegroup>.yaml
