---
id: rabbitmq.erlang_version
title: Erlang is pinned to the approved version
description: >
  The message queue hosts must pin Erlang to the approved version, because RabbitMQ is
  sensitive to the Erlang release it runs against (profile::core::rabbitmq::erlang_pin_version).
spec_section: "2.2.9"
severity: warning
kind: declarative
selector:
  type: contains_class
  class: nectar::profile::rabbitmq::cluster
query:
  type: resource_param
  resource_type: Apt::Pin
  resource_title: pin-erlang
  param: version
assertion:
  op: equals
remediation:
  guidance: Pin the approved Erlang version in the message queue nodegroup hiera.
  hiera_key: profile::core::rabbitmq::erlang_pin_version
  hint_file: data/nodegroups/<mq-nodegroup>.yaml
