<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <title>Nectar Conformance</title>
    <script>
      // Resolve theme before paint to avoid a flash of the wrong colors.
      // Mirrors src/theme.js:resolveTheme. Stored choice wins; otherwise
      // follow prefers-color-scheme; otherwise light.
      (function () {
        var stored = null
        try {
          stored = localStorage.getItem('nectar-conformance-theme')
        } catch (e) {}
        var prefersDark = window.matchMedia
          ? window.matchMedia('(prefers-color-scheme: dark)').matches
          : false
        var theme =
          stored === 'light' || stored === 'dark'
            ? stored
            : prefersDark
              ? 'dark'
              : 'light'
        document.documentElement.dataset.theme = theme
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
