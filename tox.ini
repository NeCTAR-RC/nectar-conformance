[tox]
envlist = py3,pep8
skipsdist = False

[testenv]
usedevelop = True
extras = test
commands =
    pytest {posargs:tests} --cov=nectar_conformance --cov-report=term-missing

[testenv:pep8]
description = Run style checks.
skip_install = true
deps = pre-commit
commands = pre-commit run --all-files --show-diff-on-failure

[testenv:releasenotes]
deps = reno
commands = reno lint

# Coverage run: HTML + XML reports under cover/, enforcing a floor. Uses pytest-cov (this
# project runs pytest, not stestr), so no PYTHON/parallel-mode worker trick is needed.
[testenv:cover]
description = Run unit tests with coverage; write HTML + XML reports and enforce a floor.
commands =
    coverage erase
    pytest {posargs:tests} --cov=nectar_conformance --cov-report=term-missing:skip-covered --cov-report=html:cover --cov-report=xml:cover/coverage.xml --cov-fail-under=90

# Web SPA: unit-test (vitest) and build. Shells out to npm, so it needs node/npm on
# PATH; kept out of the default envlist so `tox` stays Python-only. Run explicitly with
# `tox -e frontend`. In CI with a committed package-lock.json, use `npm ci` for a
# reproducible install.
[testenv:frontend]
description = Unit-test and build the web SPA (requires npm).
skip_install = true
change_dir = frontend
allowlist_externals = npm
commands =
    npm install
    npm test
    npm run build

[flake8]
show-source = True
# H = hacking, I = flake8-import-order. ruff owns formatting and E/F/U lint, so
# pycodestyle E/W stay deselected here; E203 is listed anyway as it conflicts with
# ruff-format's slice spacing should E ever be enabled.
select = H,I
ignore = E203,H301,H403,H404,H405
import-order-style = pep8
application-import-names = nectar_conformance
